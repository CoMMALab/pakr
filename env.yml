name: mjx
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy
  - scipy
  - matplotlib
  - pandas
  - pillow
  - jupyterlab
  - mujoco=3.3.5
  - mujoco-python=3.3.5
  - mujoco-simulate=3.3.5
  - glfw
  - pyopengl
  - setuptools
  - wheel
  - libgcc-ng
  - libgomp
  - zlib
  - libstdcxx-ng
  - libopenblas
  - pip:
      - PyYAML
      - chex
      - flax
      - optax
      - jax[cuda13_cudnn13]  # pip installs GPU-enabled jaxlib
      - jupyter
