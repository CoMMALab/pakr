name: mjx
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy
  - scipy
  - matplotlib
  - mujoco  # This installs the C++ binaries
  - glfw
  - pyopengl
  - libgcc-ng
  - libstdcxx-ng
  - pip:
      - mujoco  # This installs the Python bindings
      - flax
      - optax
      - chex
      - PyYAML